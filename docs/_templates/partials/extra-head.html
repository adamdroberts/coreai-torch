  var defined_VERSION_MATCH = "{{ version_match | safe }}";

<script src="{{ pathto('_static/version-switcher.js', 1) }}" defer></script>
<script>
  // Override Shibuya's 3-state toggle (auto/light/dark) with a 2-state toggle (light/dark)
  document.addEventListener("DOMContentLoaded", function () {
    var btn = document.querySelector(".js-theme");
    if (!btn) return;

    // Remove Shibuya's click listener by cloning the button
    var newBtn = btn.cloneNode(true);
    btn.parentNode.replaceChild(newBtn, btn);

    function getEffectiveMode() {
      var mode = document.documentElement.getAttribute("data-color-mode") || "auto";
      if (mode === "auto") {
        return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }
      return mode;
    }

    newBtn.addEventListener("click", function () {
      var next = getEffectiveMode() === "dark" ? "light" : "dark";
      if (typeof setColorMode === "function") {
        setColorMode(next);
      }
      localStorage._theme = next;
      var label = newBtn.getAttribute("data-aria-" + next);
      if (label) newBtn.setAttribute("aria-label", label);
    });
  });
</script>
